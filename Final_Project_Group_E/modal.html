<div
    class="modal fade"
    id="loginSignupModal"
    tabindex="-1"
    aria-labelledby="loginSignupModalLabel"
    aria-hidden="true"
>
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="loginSignupModalLabel">Login / Sign Up</h5>
                <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="modal"
                    aria-label="Close"
                ></button>
            </div>
            <div class="modal-body">
                <div id="loginForm">
                    <form>
                        <img
                            class="offcanvas-title img-fluid rounded-circle d-flex align-content-center mx-auto"
                            id="offcanvasNavbarLabel"
                            src="images\burger_haven_logo.png"
                            alt="Burger Haven"
                            id="havenLogo"
                            height="160px"
                            width="160px"
                        >
                        <h1 class="h3 mb-3 fw-normal dark">Sign in</h1>
                        <div class="form-floating">
                            <input
                                type="name"
                                class="form-control"
                                id="floatingInput"
                                placeholder="name"
                            >
                            <label for="floatingInput">Username</label>
                        </div>
                        <div class="form-floating">
                            <input
                                type="password"
                                class="form-control"
                                id="floatingPassword"
                                placeholder="Password"
                            >
                            <label for="floatingPassword">Password</label>
                        </div>
                        <div class="form-check text-start my-3">
                            <input
                                class="form-check-input"
                                type="checkbox"
                                value="remember-me"
                                id="flexCheckDefault"
                            >
                            <label class="form-check-label " for="flexCheckDefault">
                                Remember me
                            </label>
                        </div>
                        <button class="btn btn-primary w-100 py-2" type="submit" id="signInButton">Sign in</button>
                    </form>
                </div>
                <div id="signupForm" class="d-none">
                    <form>
                        <img
                            class="offcanvas-title img-fluid rounded-circle d-flex align-content-center mx-auto"
                            id="offcanvasNavbarLabel"
                            src="images\burger_haven_logo.png"
                            alt="Burger Haven"
                            id="havenLogo"
                            height="160px"
                            width="160px"
                        >
                        <h1 class="h3 mb-3 fw-normal dark">Sign in</h1>
                        <div class="form-floating">
                            <input
                                type="text"
                                class="form-control"
                                id="username"
                                placeholder="Username"
                                required
                            >
                            <label for="username">Username</label>
                        </div>
                        <div class="form-floating">
                            <input
                                type="email"
                                class="form-control"
                                id="signupEmail"
                                placeholder="name@example.com"
                                required
                            >
                            <label for="signupEmail">Email</label>
                        </div>
                        <div class="form-floating mb-3">
                            <input
                                type="tel"
                                class="form-control"
                                id="phone"
                                placeholder="Phone Number"
                                required
                                pattern="^\+?[0-9]{10,15}$"
                            >
                            <label for="phone">Phone Number</label>
                            <small class="text-muted">Format: +1234567890</small>
                        </div>
                        <div class="form-floating">
                            <input
                                type="password"
                                class="form-control"
                                id="signupPassword"
                                placeholder="Password"
                                required
                            >
                            <label for="signupPassword">Password</label>
                        </div>
                        <div class="form-floating">
                            <input
                                type="password"
                                class="form-control"
                                id="repeatPassword"
                                placeholder="Repeat Password"
                                required
                            >
                            <label for="repeatPassword">Repeat Password</label>
                        </div>
                        <button class="btn btn-primary w-100 py-2" type="submit" id="signUnButton">Sign Up</button>
                    </form>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-link" id="toggleToSignUp" style="display: none;">Don't have an account? Register</button>
                <button class="btn btn-link" id="toggleToSignIn">Already have an account? Log in</button>
            </div>
        </div>
    </div>
</div>
