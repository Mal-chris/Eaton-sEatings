        <header id="home" class="hero">
            <div class="container">
                <h1 class="display-4">Eaton's Burger Haven</h1>
                <h4 class="lead">Applications</h4>
            </div>
        </header>
        <body>
            <svg xmlns="http://www.w3.org/2000/svg" class="d-none">
                <symbol id="people-circle" viewBox="0 0 16 16">
                    <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/>
                    <path fill-rule="evenodd" d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8zm8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1z"/>
                </symbol>
            </svg>
            <main>
                <header class="bg-dark text-white text-center py-3">
                    <h1>Join The Burger Haven Family! Apply Today</h1>
                </header>
                <main class="container mt-4">
                    <div class="row">
                        <div class="col-md-6">
                            <form class="row g-3">
                                <div class="col-md-6">
                                    <label for="firstName" class="form-label">First Name</label>
                                    <input
                                        type="text"
                                        class="form-control"
                                        id="firstName"
                                        required
                                    >
                                </div>
                                <div class="col-md-6">
                                    <label for="lastName" class="form-label">Last Name</label>
                                    <input
                                        type="text"
                                        class="form-control"
                                        id="lastName"
                                        required
                                    >
                                </div>
                                <div class="col-md-6">
                                    <label for="email" class="form-label">Email</label>
                                    <input
                                        type="email"
                                        class="form-control"
                                        id="email"
                                        required
                                    >
                                </div>
                                <div class="col-md-6">
                                    <label for="phone" class="form-label">Phone</label>
                                    <input type="text" class="form-control" id="phone">
                                </div>
                                <div class="col-md-12">
                                    <label for="position" class="form-label">Position</label>
                                    <select class="form-select" id="position" required>
                                        <option value="" disabled selected>Select Position</option>
                                        <option>Cashier</option>
                                        <option>Cook</option>
                                        <option>Delivery Driver</option>
                                        <option>Manager</option>
                                    </select>
                                </div>
                                <div class="col-md-12">
                                    <label for="resume" class="form-label">Upload Resume</label>
                                    <input
                                        type="file"
                                        class="form-control"
                                        id="resume"
                                        required
                                    >
                                </div>
                                <div class="col-12">
                                    <button class="btn btn-primary" type="submit">Submit Application</button>
                                </div>
                            </form>
                        </div>
                        <div class="col-md-6">
                            <img src="images\staff.jpeg" class="img-fluid border-5 bi-circle-half" alt="Team working">
                        </div>
                    </div>
                </main>
